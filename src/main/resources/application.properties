spring.application.name=NearPharma

# Local dev: values come from env.properties (git-ignored, never committed)
# Docker:    values come from environment variables set in compose.yaml
spring.config.import=optional:file:./env.properties

# RapidAPI key — env var RAPIDAPI_KEY overrides env.properties in Docker
rapidApiKey.key=${RAPIDAPI_KEY:}

# Datasource
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# CORS — comma-separated list of allowed origins
# Railway env: CORS_ALLOWED_ORIGINS=https://your-app.vercel.app
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# Logging — INFO in production; set WARN/ERROR on deployment if desired
logging.level.org.hibernate=INFO
logging.level.org.springframework=INFO
logging.level.com.example.NearPharma=INFO