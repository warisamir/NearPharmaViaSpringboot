# Datasource is provided automatically by @ServiceConnection on the PostgreSQLContainer.
# No manual datasource URL/username/password needed here.

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
# Use the real PostgreSQL dialect — same as production
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

rapidApiKey.key=test-api-key
